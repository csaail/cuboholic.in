<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault | Cuboholic</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="vault-page">
  <div class="vault-container">
    <a href="/" class="vault-back">&larr; Back to portfolio</a>

    <div class="vault-header">
      <h1>Private Vault</h1>
      <p>Upload files to Google Drive and get shareable links.</p>
    </div>

    <!-- Login -->
    <div id="loginPanel">
      <div class="login-box">
        <h2>Sign In</h2>
        <p style="font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;">
          Sign in with your Google account to access the vault.
        </p>
        <button type="button" class="submit-btn" id="googleSignInBtn">Sign in with Google &rarr;</button>
        <p class="login-error" id="loginError"></p>
      </div>
    </div>

    <!-- Vault Panel -->
    <div id="vaultPanel" class="vault-panel">
      <div class="vault-toolbar">
        <span id="userEmail"></span>
        <button class="btn-logout" id="logoutBtn">Sign Out</button>
      </div>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">&#128193;</div>
        <p>Drop files here or click to browse</p>
        <input type="file" class="upload-input" id="fileInput" multiple>
      </div>

      <div class="upload-progress" id="uploadProgress">
        <div class="progress-label" id="progressLabel">Uploading...</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="file-list">
        <h3>Uploaded Files</h3>
        <div id="fileList">
          <p class="file-list-empty">Loading files...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="js/vault.js"></script>
</body>
</html>
